services:
  app:
    build: .
    container_name: bloco-notas-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: chave-secreta
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 123
      DB_NAME: dbnotas
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: bloco-notas-db
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: dbnotas
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped

volumes:
  mysql_data:
